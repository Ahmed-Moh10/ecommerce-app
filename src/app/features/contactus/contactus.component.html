<section class="bg-[#F9F9F9] py-10">
  <div class="container mx-auto max-w-7xl p-8 md:p-12 rounded-3xl">
    <div class="mb-10">
      <h2 class="text-[#1A1A37] text-4xl font-bold mb-3">Contact me</h2>
      <p class="text-[#9D9DAA] text-lg">
        Let’s talk style! Reach out for fashion advice, order updates, or just to say hi. Your
        perfect look starts with a conversation.
      </p>
    </div>

    <form class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
      <div class="flex flex-col gap-2">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">First name</label>
        <input
          type="text"
          class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">Last name</label>
        <input
          type="text"
          class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">Email</label>
        <input
          type="email"
          class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">Phone number</label>
        <input
          type="tel"
          class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all"
        />
      </div>

      <div class="md:col-span-2 flex flex-col gap-2 relative">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">Choose a topic</label>
        <select
          class="w-full border border-gray-200 rounded-xl p-4 appearance-none focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all bg-white text-gray-400 cursor-pointer"
        >
          <option selected disabled>Select one...</option>
          <option>Inspiration & Style</option>
          <option>Order Inquiry</option>
          <option>Technical Support</option>
        </select>
      </div>

      <div class="md:col-span-2 flex flex-col gap-2">
        <label class="text-[#1A1A37] font-semibold text-sm ml-1">Message</label>
        <textarea
          rows="5"
          placeholder="Type your message..."
          class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 focus:border-[#916841] transition-all resize-none"
        ></textarea>
      </div>

      <div class="md:col-span-2 flex items-center gap-3 py-2">
        <input
          type="checkbox"
          id="terms"
          class="w-5 h-5 rounded border-gray-300 text-[#916841] focus:ring-[#916841] cursor-pointer accent-[#916841]"
        />
        <label for="terms" class="text-[#9D9DAA] text-sm cursor-pointer select-none">
          I accept the terms
        </label>
      </div>

      <div class="md:col-span-2 mt-2">
        <button
          type="submit"
          class="bg-[#916841] w-full md:w-auto cursor-pointer font-semibold text-white px-20 py-3 rounded-[40px] text-lg transition-colors duration-300 hover:bg-[#7a5635]"
        >
          Submit
        </button>
      </div>
    </form>
  </div>

  <div
    class="container mx-auto max-w-6xl bg-white py-18 px-8 mt-10 rounded-3xl shadow-sm flex flex-col items-center text-center"
  >
    <div class="text-[#916841] mb-6">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-16 h-16"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
        />
      </svg>
    </div>

    <h2 class="text-[#1A1A37] text-xl md:text-2xl font-bold tracking-wider mb-4 uppercase">
      SIGN UP FOR TEEMATE STYLE NEWS
    </h2>

    <p class="text-[#667085] max-w-2xl leading-snug mb-10">
      Get 15% off your first purchase! Plus, be the first to know about sales,
      <br class="hidden md:block" />
      new product launches and exclusive offers!
    </p>

    <form class="w-full max-w-2xl flex flex-col md:flex-row items-center gap-4">
      <div class="relative w-full">
        <input
          type="email"
          placeholder="Enter your email"
          class="w-full border border-[#916841]/30 rounded-xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-[#916841]/20 transition-all placeholder:text-gray-400"
        />
      </div>

      <button
        type="submit"
        class="cursor-pointer w-full md:w-auto bg-[#9D8665] hover:bg-[#8a7456] text-white px-10 py-4 rounded-xl font-semibold transition-all shadow-md active:scale-95 whitespace-nowrap"
      >
        Subscribe
      </button>
    </form>
  </div>
</section>
