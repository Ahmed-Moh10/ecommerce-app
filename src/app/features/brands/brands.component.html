<section class="bg-gray-100 py-20 border border-gray-400">
  <div class="container mx-auto px-4">
    <div class="mb-12 text-center">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-800">Shop By Brands</h2>
      <div class="w-20 h-1 bg-[#8B5E35] mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="bg-white parent mt-10 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (brand of brandsList(); track brand._id) {
        <div
          class="card rounded-xl transition-all duration-300 hover:border-[#916841] hover:scale-[1.02] p-4"
        >
          <img [src]="brand.image" class="w-full" [alt]="brand.name" />
          <h3 class="text-center">{{ brand.name }}</h3>
        </div>
      }
    </div>
  </div>
</section>
