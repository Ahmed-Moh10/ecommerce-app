<section class="py-10 md:py-20">
  <div class="container mx-auto px-4">
    <div class="mb-12 text-center">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-800">Product Details</h2>
      <div class="w-20 h-1 bg-[#8B5E35] mx-auto mt-4 rounded-full"></div>
    </div>

    @if (productDetails) {
      <div
        class="grid grid-cols-1 md:grid-cols-12 items-center gap-8 lg:gap-12 bg-white p-4 md:p-0 rounded-3xl shadow-sm md:shadow-none"
      >
        <div class="md:col-span-4 lg:col-span-4">
          <div class="overflow-hidden rounded-2xl border border-gray-100 shadow-lg">
            <img
              [src]="productDetails.imageCover"
              class="w-full h-auto object-cover transform hover:scale-105 transition-transform duration-500"
              [alt]="productDetails.title"
            />
          </div>
        </div>

        <div class="md:col-span-8 lg:col-span-8 flex flex-col justify-center">
          <h2 class="text-2xl md:text-4xl font-bold text-gray-900 leading-tight">
            {{ productDetails.title }}
          </h2>

          <div class="flex items-center gap-2 mt-3">
            <span class="bg-[#8B5E35]/10 text-[#8B5E35] px-3 py-1 rounded-full text-sm font-medium">
              {{ productDetails.category.name }}
            </span>
          </div>

          <p class="text-gray-600 text-base md:text-lg my-6 leading-relaxed">
            {{ productDetails.description }}
          </p>

          <div
            class="flex items-center justify-between border-t border-b border-gray-100 py-4 mb-6"
          >
            <span class="text-2xl md:text-3xl font-bold text-[#8B5E35]">
              {{ productDetails.price }} EGP
            </span>
            <span class="flex items-center gap-1 font-semibold text-gray-700">
              <i class="fas fa-star text-yellow-500"></i> {{ productDetails.ratingsAverage }}
            </span>
          </div>

          <button
            (click)="addProductItemToCart(productDetails.id)"
            class="w-full cursor-pointer bg-[#8B5E35] text-white px-12 py-4 rounded-full font-bold text-lg hover:bg-[#7a5635] transition-all transform active:scale-95 shadow-lg shadow-[#8B5E35]/20"
          >
            <i class="fas fa-cart-plus mr-2"></i> Add To Cart
          </button>
        </div>
      </div>
    }
  </div>
</section>
